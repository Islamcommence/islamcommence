<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منتجك</title>
<style>
body {font-family: Arial; text-align:center; background:#f5f5f5;}
.box {background:white; padding:20px; margin:20px; border-radius:10px;}
button {padding:10px 20px; background:green; color:white; border:none; border-radius:5px;}
input {display:block; margin:10px auto; padding:10px; width:80%;}
</style>
</head>

<body>

<div class="box">
<h2>🔥 منتج رائع</h2>
<p>هذا مثال ديمو للمنتج</p>
<h3>السعر: 2000 دج</h3>

<button onclick="showForm()">شراء الآن</button>
</div>

<div id="form" style="display:none;" class="box">
<h3>املأ معلوماتك</h3>

<input type="text" placeholder="الاسم">
<input type="text" placeholder="اللقب">
<input type="text" placeholder="رقم الهاتف">
<input type="text" placeholder="الولاية">

<button onclick="sendOrder()">تأكيد الطلب</button>
</div>

<script>
function showForm(){
document.getElementById("form").style.display="block";
}

function sendOrder(){
alert("تم إرسال الطلب ✅");
}
</script>

</body>
</html>
